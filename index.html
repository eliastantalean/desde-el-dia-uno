<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Una cápsula del tiempo." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Desde el día uno.</title>

  <!--
    FONTS — Cormorant Garamond (headings) + Inter (body)
    Para usar fuentes locales: descarga los .woff2, ponlos en assets/fonts/
    y añade @font-face en styles.css en lugar de estos <link>.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Enlace de accesibilidad — salta al contenido principal -->
  <a class="skip-link" href="#letter">Saltar al contenido</a>

  <!-- Canvas para los pétalos flotantes (no eliminar) -->
  <canvas id="petals-canvas" aria-hidden="true"></canvas>

  <section id="hero" class="section-hero" role="banner">

    <div class="hero-inner">

      <!-- Rosa de origami (SVG minimalista geométrico) -->
      <div class="hero-rose-wrapper" aria-hidden="true">
        <svg class="hero-rose" viewBox="0 0 160 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Pétalos exteriores -->
          <path d="M80 28 C96 18, 118 34, 112 56 C107 72, 91 74, 80 70 C69 74, 53 72, 48 56 C42 34, 64 18, 80 28Z" stroke="currentColor" stroke-width="0.9"/>
          <path d="M112 56 C128 46, 144 64, 135 83 C128 97, 112 98, 101 90 C97 80, 101 66, 112 56Z" stroke="currentColor" stroke-width="0.9"/>
          <path d="M48 56 C32 46, 16 64, 25 83 C32 97, 48 98, 59 90 C63 80, 59 66, 48 56Z" stroke="currentColor" stroke-width="0.9"/>
          <path d="M101 90 C114 108, 103 130, 87 132 C76 133, 69 122, 72 112 C74 103, 88 97, 101 90Z" stroke="currentColor" stroke-width="0.9"/>
          <path d="M59 90 C46 108, 57 130, 73 132 C84 133, 91 122, 88 112 C86 103, 72 97, 59 90Z" stroke="currentColor" stroke-width="0.9"/>
          <!-- Pétalos medios -->
          <path d="M80 40 C92 32, 106 45, 101 62 C98 74, 87 77, 80 74 C73 77, 62 74, 59 62 C54 45, 68 32, 80 40Z" stroke="currentColor" stroke-width="0.75" opacity="0.85"/>
          <path d="M101 62 C114 54, 124 69, 117 82 C111 92, 99 94, 93 85 C90 78, 94 69, 101 62Z" stroke="currentColor" stroke-width="0.75" opacity="0.85"/>
          <path d="M59 62 C46 54, 36 69, 43 82 C49 92, 61 94, 67 85 C70 78, 66 69, 59 62Z" stroke="currentColor" stroke-width="0.75" opacity="0.85"/>
          <path d="M93 85 C104 98, 97 117, 84 119 C76 120, 72 112, 74 104 C76 97, 86 92, 93 85Z" stroke="currentColor" stroke-width="0.75" opacity="0.85"/>
          <path d="M67 85 C56 98, 63 117, 76 119 C84 120, 88 112, 86 104 C84 97, 74 92, 67 85Z" stroke="currentColor" stroke-width="0.75" opacity="0.85"/>
          <!-- Pétalos internos -->
          <path d="M80 52 C88 47, 96 55, 93 66 C91 74, 85 76, 80 74 C75 76, 69 74, 67 66 C64 55, 72 47, 80 52Z" stroke="currentColor" stroke-width="0.65" opacity="0.9"/>
          <path d="M93 66 C102 60, 109 70, 104 80 C101 87, 93 89, 88 82 C86 76, 90 70, 93 66Z" stroke="currentColor" stroke-width="0.65" opacity="0.9"/>
          <path d="M67 66 C58 60, 51 70, 56 80 C59 87, 67 89, 72 82 C74 76, 70 70, 67 66Z" stroke="currentColor" stroke-width="0.65" opacity="0.9"/>
          <!-- Centro -->
          <ellipse cx="80" cy="74" rx="8" ry="7" stroke="currentColor" stroke-width="0.8" opacity="0.95"/>
          <ellipse cx="80" cy="74" rx="4" ry="3.5" stroke="currentColor" stroke-width="0.7" opacity="1"/>
          <!-- Tallo -->
          <path d="M80 132 Q77 152 79 174" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
          <!-- Hojas -->
          <path d="M79 150 Q62 142 57 128 Q70 135 79 148" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
          <path d="M79 162 Q97 153 102 139 Q89 146 79 160" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Texto principal -->
      <div class="hero-text">

        <!-- MODIFICAR: Título principal -->
        <h1 class="hero-title">Desde el día uno.</h1>

        <!-- MODIFICAR: Subtítulo -->
        <p class="hero-subtitle">
          Este mensaje fue escrito incluso antes de saber<br>
          si algún día llegarías a leerlo.
        </p>

      </div>
    </div>

  </section>

  <section id="letter" class="section-letter reveal-section">
    <div class="container" style="margin-top: 0;">

      <div class="section-label" aria-hidden="true">Para Fiorella</div>

      <article class="letter-wrap" aria-label="Carta personal">
        <div class="letter-paper">
          <div class="letter-deco" aria-hidden="true"></div>
          <!--
            El texto de la carta se escribe dinámicamente.
            MODIFICAR el contenido en script.js → LETTER_PARAGRAPHS
          -->
          <div class="letter-body" id="letter-body" aria-live="polite" aria-label="Contenido de la carta"></div>
        </div>
      </article>

    </div>
  </section>

  <section id="gallery" class="section-gallery reveal-section">
    <div class="container container--wide">

      <h2 class="section-title">¿Recuerdas estos momentos?</h2>

      <!--
        MODIFICAR FOTOS: Cambia el valor de data-src y src en cada figure.
        Ejemplo: data-src="assets/images/foto1.jpg"
        El alt describe la foto para accesibilidad.
        Agrega o quita <figure> según necesites.
        Las clases gallery-item--wide y gallery-item--tall cambian el tamaño en desktop.
      -->
      <div class="gallery-grid" role="list" aria-label="Galería de fotografías">

        <figure class="gallery-item" role="listitem" tabindex="0"
          data-src="assets/images/foto1.jpg"
          data-date="20/06/2026"
          data-caption="Nos volvimos a ver luego de 12 años.">
          <div class="gallery-ph" aria-hidden="true">
            <span class="gallery-ph-num">01</span>
            <span class="gallery-ph-label">foto1.jpg</span>
          </div>
          <img src="assets/images/foto1.jpg" alt="Fotografía 1" loading="lazy" />
          <figcaption class="gallery-cap">
            <span class="gcap-date">20/06/2026</span>
            <span class="gcap-text">Nos volvimos a ver luego de 12 años.</span>
          </figcaption>
        </figure>

        <figure class="gallery-item" role="listitem" tabindex="0"
          data-src="assets/images/foto2.jpg"
          data-date="27/06/2026"
          data-caption="Conocí tu restaurant favorito de Barranco.">
          <div class="gallery-ph" aria-hidden="true">
            <span class="gallery-ph-num">02</span>
            <span class="gallery-ph-label">foto2.jpg</span>
          </div>
          <img src="assets/images/foto2.jpg" alt="Fotografía 2" loading="lazy" />
          <figcaption class="gallery-cap">
            <span class="gcap-date">27/06/2026</span>
            <span class="gcap-text">Conocí tu restaurant favorito de Barranco.</span>
          </figcaption>
        </figure>

        <figure class="gallery-item" role="listitem" tabindex="0"
          data-src="assets/images/foto3.jpg"
          data-date="· · ·"
          data-caption="Cada imagen, un recuerdo.">
          <div class="gallery-ph" aria-hidden="true">
            <span class="gallery-ph-num">03</span>
            <span class="gallery-ph-label">foto3.jpg</span>
          </div>
          <img src="assets/images/foto3.jpg" alt="Fotografía 3" loading="lazy" />
          <figcaption class="gallery-cap">
            <span class="gcap-date">· · ·</span>
            <span class="gcap-text">Cada imagen, un recuerdo.</span>
          </figcaption>
        </figure>

        <figure class="gallery-item" role="listitem" tabindex="0"
          data-src="assets/images/foto4.jpg"
          data-date="· · ·"
          data-caption="Guardado para siempre.">
          <div class="gallery-ph" aria-hidden="true">
            <span class="gallery-ph-num">04</span>
            <span class="gallery-ph-label">foto4.jpg</span>
          </div>
          <img src="assets/images/foto4.jpg" alt="Fotografía 4" loading="lazy" />
          <figcaption class="gallery-cap">
            <span class="gcap-date">· · ·</span>
            <span class="gcap-text">Guardado para siempre.</span>
          </figcaption>
        </figure>

        <figure class="gallery-item" role="listitem" tabindex="0"
          data-src="assets/images/foto5.jpg"
          data-date="· · ·"
          data-caption="Nuestro tiempo.">
          <div class="gallery-ph" aria-hidden="true">
            <span class="gallery-ph-num">05</span>
            <span class="gallery-ph-label">foto5.jpg</span>
          </div>
          <img src="assets/images/foto5.jpg" alt="Fotografía 5" loading="lazy" />
          <figcaption class="gallery-cap">
            <span class="gcap-date">· · ·</span>
            <span class="gcap-text">Nuestro tiempo.</span>
          </figcaption>
        </figure>

        <figure class="gallery-item" role="listitem" tabindex="0"
          data-src="assets/images/foto6.jpg"
          data-date="· · ·"
          data-caption="Lo que siempre recordaré.">
          <div class="gallery-ph" aria-hidden="true">
            <span class="gallery-ph-num">06</span>
            <span class="gallery-ph-label">foto6.jpg</span>
          </div>
          <img src="assets/images/foto6.jpg" alt="Fotografía 6" loading="lazy" />
          <figcaption class="gallery-cap">
            <span class="gcap-date">· · ·</span>
            <span class="gcap-text">Lo que siempre recordaré.</span>
          </figcaption>
        </figure>

      </div>
    </div>
  </section>

  <!-- Lightbox (se activa al hacer click en una foto) -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Imagen ampliada" hidden>
    <button class="lightbox-close" id="lightbox-close" aria-label="Cerrar imagen">&#x2715;</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lightbox-img" src="" alt="" />
      <p class="lightbox-cap" id="lightbox-cap"></p>
    </div>
  </div>

  <footer id="footer" class="section-footer reveal-section" role="contentinfo">
    <div class="container">

      <div class="footer-inner">
        <p class="footer-date">Escrito el 29 de junio del 2026.</p>
      </div>

    </div>
  </footer>


  <script src="script.js"></script>
</body>
</html>
